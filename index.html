<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>주역 - 동전점법</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%23c04851'/><text x='50' y='55' text-anchor='middle' dominant-baseline='central' font-size='60' fill='%23d6a01d'>卦</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Hahmlet:wght@400;500;700;900&family=LXGW+WenKai+TC:wght@400;700&family=Liu+Jian+Mao+Cao&family=Long+Cang&family=Ma+Shan+Zheng&family=Noto+Serif+KR:wght@400;700&family=Song+Myung&family=Zhi+Mang+Xing&display=swap" rel="stylesheet">
  <style>
    /* 크리티컬 CSS — FOUC 방지 */
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0c0c0c;overflow:hidden}
    #scene,#ui-overlay,#result-modal{opacity:0}
    #loading-screen{position:fixed;inset:0;z-index:9999;background:#0c0c0c;display:flex;align-items:center;justify-content:center}
    .loading-char{font-family:serif;font-size:3rem;color:#a07818;animation:p 1.5s ease-in-out infinite}
    @keyframes p{0%,100%{opacity:.3}50%{opacity:1}}
  </style>
</head>
<body>
  <div id="loading-screen">
    <p class="loading-char">卦</p>
  </div>
  <canvas id="scene"></canvas>

  <div id="ui-overlay">
    <header id="header">
      <h1 class="title-hanja">周易占卦</h1>
      <p class="subtitle">마음을 가다듬고 동전을 던지세요</p>
    </header>

    <div id="spacer"></div>

    <div id="bottom-area">
      <div id="hexagram-panel">
        <div id="hexagram-lines"></div>
        <div id="throw-counter">
          <span id="current-throw">0</span> / 6
        </div>
      </div>
      <div id="coin-result-display"></div>
      <div id="controls">
        <button id="throw-btn">擲&ensp;던지기</button>
        <button id="view-result-btn" class="hidden">결과 보기</button>
      </div>
    </div>
  </div>

  <div id="result-modal" class="hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <button id="modal-close-btn" aria-label="닫기">✕</button>
      <div class="modal-scroll">
        <div class="result-primary">
          <p class="result-label">현재의 괘</p>
          <div id="result-hex-visual" class="result-lines"></div>
          <h2 id="result-name" class="result-name"></h2>
          <p id="result-full-name" class="result-subname"></p>
          <div class="diamond-ornament">◆</div>
          <p id="result-keyword" class="result-keyword"></p>
          <blockquote id="result-judgment" class="result-quote"></blockquote>
          <div class="line-ornament"></div>
          <p id="result-image" class="result-image"></p>
        </div>

        <div id="result-changing" class="hidden">
          <div class="changing-bridge"><span>변화할 괘</span></div>
          <div class="result-changed">
            <div id="changed-hex-visual" class="result-lines"></div>
            <h3 id="changed-name" class="result-name"></h3>
            <p id="changed-full-name" class="result-subname"></p>
            <div class="diamond-ornament">◆</div>
            <p id="changed-keyword" class="result-keyword"></p>
            <blockquote id="changed-judgment" class="result-quote"></blockquote>
            <div class="line-ornament"></div>
            <p id="changed-image" class="result-image"></p>
          </div>
        </div>

        <div class="modal-footer">
          <button id="share-btn">공유하기</button>
          <button id="new-reading-btn">다시 점치기</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
